name: Deploy Documentation

on:
  push:
    branches: [ main, develop ]
    paths: [ 'docs/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'docs/**' ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd docs
        pip install -r requirements.txt

    - name: Configure Git user
      run: |
        cd docs
        git config user.name "GitHub Actions"
        git config user.email "actions@users.noreply.github.com"

    - name: Build documentation
      run: |
        cd docs
        mkdocs build --clean

    - name: Optimize assets
      run: |
        cd docs
        # Compress images
        find site -name "*.png" -exec pngquant --quality=65-80 --output {} --force {} \; 2>/dev/null || true
        find site -name "*.jpg" -o -name "*.jpeg" -exec jpegoptim --max=80 --strip-all {} \; 2>/dev/null || true
        # Minify CSS and JS
        find site -name "*.css" -exec cleancss --output {} {} \; 2>/dev/null || true
        find site -name "*.js" -exec terser {} --output {} --compress --mangle {} \; 2>/dev/null || true

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./docs/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
