    - Getting Started: user-guide/getting-started.md
    - Dashboard: user-guide/dashboard.md
    - Projects: user-guide/projects.md
    - Evidence Management: user-guide/evidence-management.md
    - Compliance Tracking: user-guide/compliance-tracking.md
    - AI Assistant: user-guide/ai-assistant.md
    - Risk Management: user-guide/risk-management.md
    - Reports: user-guide/reports.md
  - Admin Guide:
    - admin-guide/index.md
    - User Management: admin-guide/user-management.md
    - System Configuration: admin-guide/system-configuration.md
    - Security Settings: admin-guide/security-settings.md
    - Backup & Recovery: admin-guide/backup-recovery.md
    - Monitoring: admin-guide/monitoring.md
  - Developer Guide:
    - developer-guide/index.md
    - API Reference: developer-guide/api-reference.md
    - Architecture: developer-guide/architecture.md
    - Database Schema: developer-guide/database-schema.md
    - Integrations: developer-guide/integrations.md
    - Contributing: developer-guide/contributing.md
  - Architecture:
    - architecture/index.md
    - System Overview: architecture/system-overview.md
    - Microservices: architecture/microservices.md
    - Security Model: architecture/security-model.md
    - Deployment: architecture/deployment.md
  - Integrations:
    - integrations/index.md
    - FleetDM: integrations/fleetdm.md
    - Prowler: integrations/prowler.md
    - n8n Workflows: integrations/n8n.md
    - Google Services: integrations/google-services.md
    - Jira: integrations/jira.md
